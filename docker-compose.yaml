services:
  db:
    image: postgres:15
    container_name: postgres_tfm
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: tfm_password
      POSTGRES_DB: economia_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U admin -d economia_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./sql_init:/docker-entrypoint-initdb.d
    networks:
      - tfm_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_tfm
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tfm.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - tfm_network
    volumes:
       - ./pgadmin_config/servers.json:/pgadmin4/servers.json

  grafana:
    image: grafana/grafana-oss
    container_name: grafana_tfm
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true # ¡IMPORTANTE para verlo en Streamlit!
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana_tfm:3000/
      # - GF_RENDERING_RENDERER_TOKEN=token
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning #
      - ./grafana_data:/var/lib/grafana #
    networks:
      - tfm_network
    depends_on:
      - db

  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana_renderer
    environment:
      - IGNORE_HTTPS_ERRORS=true
      - RENDERING_MODE=clustered
    networks:
      - tfm_network

  streamlit:
    build: ./streamlit_app
    container_name: streamlit_tfm
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app 
    depends_on:
      - db
    networks:
      - tfm_network

  etl:
      build: ./etl_service
      container_name: etl_tfm
      restart: on-failure
      depends_on:
        db:
          condition: service_healthy
      env_file: .env
      volumes:
        - ./data:/app/data  #  Carpeta de los CSVs
      networks:
        - tfm_network
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - streamlit
      - grafana
      - pgadmin
    networks:
      - tfm_network
  backend:
    build: ./backend
    container_name: backend_tfm
    restart: always
    env_file: .env
    environment:
    - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tfm_network
# Red interna servicios
networks:
  tfm_network:
    driver: bridge
